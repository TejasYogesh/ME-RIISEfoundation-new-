name: Build and Push to Deploy Branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to gh-deploy Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-deploy

      - name: Trigger Hostinger Deployment
        if: success()
        run: |
          curl -X POST "${{ secrets.HOSTINGER_WEBHOOK_URL }}"